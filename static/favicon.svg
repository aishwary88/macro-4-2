<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a017"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  
  <!-- Speedometer Arc -->
  <path d="M 18 45 A 14 14 0 1 1 46 45" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Speed Marks -->
  <line x1="22" y1="22" x2="24" y2="24" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="18" x2="32" y2="21" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="42" y1="22" x2="40" y2="24" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Speed Needle -->
  <line x1="32" y1="32" x2="38" y2="26" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="32" r="2" fill="#ffffff"/>
  
  <!-- Text -->
  <text x="32" y="52" font-family="Arial, sans-serif" font-weight="bold" font-size="8" 
        text-anchor="middle" fill="#ffffff" letter-spacing="0.5">SPEED</text>
</svg>
